<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ARchetipo Viewer</title>
  <style>
    :root {
      --ink: #1f2521;
      --muted: #66736c;
      --paper: #f6f1e8;
      --paper-2: #fffaf1;
      --line: #d9cdbb;
      --green: #2f6f4f;
      --green-soft: #e6f0e6;
      --blue: #255b7d;
      --blue-soft: #e3edf2;
      --amber: #a76020;
      --amber-soft: #f6e8ce;
      --red: #9b3d33;
      --red-soft: #f1ded8;
      --shadow: 0 20px 70px rgba(47, 39, 28, .13);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(31, 37, 33, .035) 1px, transparent 1px) 0 0 / 24px 24px,
        linear-gradient(rgba(31, 37, 33, .025) 1px, transparent 1px) 0 0 / 24px 24px,
        radial-gradient(circle at 18% 8%, rgba(47, 111, 79, .17), transparent 32%),
        linear-gradient(135deg, #fbf7ee 0%, #efe5d3 100%);
      font-family: "Aptos", "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    button, input, select { font: inherit; }

    .shell {
      width: min(1800px, calc(100vw - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto;
      gap: 18px;
      align-items: start;
      margin-bottom: 18px;
    }

    .brand {
      padding: 20px 22px;
      background: rgba(255, 250, 241, .82);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    h1 {
      margin: 8px 0 6px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 4vw, 64px);
      line-height: .92;
      font-weight: 700;
      letter-spacing: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      padding: 14px;
      background: rgba(31, 37, 33, .88);
      border: 1px solid rgba(255, 250, 241, .18);
      box-shadow: var(--shadow);
    }

    .btn, .icon-btn {
      min-height: 42px;
      border: 1px solid rgba(31, 37, 33, .18);
      border-radius: 6px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      background: var(--paper-2);
      color: var(--ink);
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .btn:hover, .icon-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(0, 0, 0, .12); }
    .btn.primary { background: #d7f0c9; border-color: #9bc180; font-weight: 800; }
    .btn.dark { background: #2f6f4f; color: #fffaf1; border-color: #2f6f4f; }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }
    .icon { width: 18px; height: 18px; flex: 0 0 auto; }

    .statusbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin: 0 0 18px;
      padding: 12px 14px;
      background: rgba(255, 250, 241, .76);
      border: 1px solid var(--line);
      color: var(--muted);
      min-height: 50px;
    }

    .statusbar strong { color: var(--ink); }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--paper-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 190px 190px;
      gap: 10px;
      margin-bottom: 18px;
    }

    .field {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 250, 241, .82);
      border: 1px solid var(--line);
      padding: 8px 10px;
      min-height: 46px;
    }

    .field input, .field select {
      width: 100%;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--ink);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(5, minmax(260px, 1fr));
      gap: 14px;
      align-items: start;
      overflow-x: auto;
      padding-bottom: 10px;
    }

    .column {
      min-width: 290px;
      background: rgba(255, 250, 241, .66);
      border: 1px solid var(--line);
      box-shadow: 0 14px 44px rgba(47, 39, 28, .08);
    }

    .column.drag-over {
      outline: 3px solid rgba(47, 111, 79, .35);
      outline-offset: 2px;
    }

    .column-head {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      background: rgba(255, 250, 241, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(14px);
    }

    .column-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .stripe {
      width: 8px;
      height: 34px;
      border-radius: 5px;
      background: var(--muted);
    }

    .column h2 {
      margin: 0;
      font-size: 16px;
      letter-spacing: 0;
    }

    .column-count {
      min-width: 34px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      background: var(--paper);
      border-radius: 999px;
      font-weight: 900;
    }

    .cards {
      min-height: 220px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 12px;
    }

    .card {
      position: relative;
      border: 1px solid rgba(31, 37, 33, .18);
      background: var(--paper-2);
      border-radius: var(--radius);
      box-shadow: 0 8px 18px rgba(47, 39, 28, .08);
      padding: 13px;
      cursor: grab;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 34px rgba(47, 39, 28, .14);
      border-color: rgba(47, 111, 79, .5);
    }

    .card:active { cursor: grabbing; }
    .card.hidden { display: none; }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .code {
      display: inline-flex;
      padding: 4px 8px;
      background: #1f2521;
      color: #fffaf1;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 900;
    }

    .priority {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      border: 1px solid transparent;
    }

    .priority.high { background: var(--red-soft); color: var(--red); border-color: rgba(155, 61, 51, .18); }
    .priority.medium { background: var(--amber-soft); color: var(--amber); border-color: rgba(167, 96, 32, .18); }
    .priority.low { background: var(--blue-soft); color: var(--blue); border-color: rgba(37, 91, 125, .18); }

    .card h3 {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .story {
      color: #3f4943;
      font-size: 13px;
      line-height: 1.4;
      margin: 0 0 12px;
    }

    .tasks {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px dashed var(--line);
    }

    .task-summary {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 8px;
    }

    .task-list {
      display: grid;
      gap: 7px;
      max-height: 180px;
      overflow: auto;
      padding-right: 4px;
    }

    .task {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 7px;
      align-items: start;
      font-size: 12px;
      line-height: 1.3;
      color: #3f4943;
    }

    .task-state {
      padding: 2px 5px;
      border-radius: 4px;
      background: var(--paper);
      color: var(--muted);
      font-size: 10px;
      font-weight: 900;
      border: 1px solid var(--line);
    }

    .drawer {
      position: fixed;
      inset: auto 18px 18px auto;
      width: min(620px, calc(100vw - 36px));
      max-height: min(760px, calc(100vh - 36px));
      overflow: auto;
      background: #fffaf1;
      border: 1px solid rgba(31, 37, 33, .2);
      box-shadow: 0 30px 90px rgba(31, 37, 33, .22);
      border-radius: var(--radius);
      padding: 18px;
      z-index: 20;
      transform: translateY(18px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
    }

    .drawer.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .drawer-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 14px;
    }

    .drawer h2 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 30px;
      line-height: 1;
    }

    .detail-section {
      border-top: 1px solid var(--line);
      padding-top: 12px;
      margin-top: 12px;
    }

    .detail-section h3 {
      margin: 0 0 8px;
      font-size: 13px;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .detail-section ul {
      margin: 0;
      padding-left: 18px;
      color: #3f4943;
      line-height: 1.42;
    }

    .empty {
      padding: 28px 16px;
      color: var(--muted);
      text-align: center;
      border: 1px dashed var(--line);
      background: rgba(255, 250, 241, .5);
      border-radius: var(--radius);
    }

    .notice {
      display: none;
      margin-bottom: 18px;
      padding: 18px;
      border: 1px solid rgba(155, 61, 51, .24);
      background: var(--red-soft);
      color: var(--red);
      box-shadow: var(--shadow);
    }

    .notice.show { display: block; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%) translateY(20px);
      background: #1f2521;
      color: #fffaf1;
      padding: 12px 16px;
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease, transform .18s ease;
      z-index: 40;
      box-shadow: 0 16px 45px rgba(31, 37, 33, .25);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 980px) {
      .topbar, .statusbar, .filters { grid-template-columns: 1fr; }
      .toolbar { justify-content: stretch; }
      .toolbar .btn { flex: 1 1 180px; }
      .board { grid-template-columns: repeat(5, 82vw); }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div class="brand">
        <h1>ARchetipo Viewer</h1>
      </div>
      <div class="toolbar" aria-label="Azioni principali">
        <button class="btn primary" id="openProject" type="button" title="Seleziona la cartella root del progetto">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h5l2 2h11v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z"/><path d="M3 7V5a2 2 0 0 1 2-2h3l2 2h4"/></svg>
          Apri progetto
        </button>
        <button class="btn" id="reload" type="button" disabled title="Rilegge backlog e planning">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M16 8h5V3"/></svg>
          Ricarica
        </button>
        <button class="btn dark" id="save" type="button" disabled title="Salva su docs/BACKLOG.md">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15.2 3a2 2 0 0 1 1.4.6l3.8 3.8a2 2 0 0 1 .6 1.4V19a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Z"/><path d="M17 21v-7H7v7"/><path d="M7 3v5h8"/></svg>
          Salva
        </button>
      </div>
    </section>

    <div class="notice" id="notice"></div>

    <section class="statusbar">
      <div id="statusText">Apertura della root di progetto predefinita...</div>
      <div class="stats" id="stats"></div>
    </section>

    <section class="filters" aria-label="Filtri">
      <label class="field">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
        <input id="search" type="search" placeholder="Cerca storia, epic, testo o task">
      </label>
      <label class="field">
        <select id="epicFilter" aria-label="Filtro epic"><option value="">Tutti gli epic</option></select>
      </label>
      <label class="field">
        <select id="priorityFilter" aria-label="Filtro priorita"><option value="">Tutte le priorita</option></select>
      </label>
    </section>

    <section class="board" id="board" aria-label="Kanban backlog"></section>
  </main>

  <aside class="drawer" id="drawer" aria-live="polite"></aside>
  <div class="toast" id="toast"></div>

  <script>
    const STATUSES = [
      { key: "TODO", label: "TODO", color: "#66736c" },
      { key: "PLANNED", label: "PLANNED", color: "#255b7d" },
      { key: "IN PROGRESS", label: "IN PROGRESS", color: "#a76020" },
      { key: "REVIEW", label: "REVIEW", color: "#8b5a9a" },
      { key: "DONE", label: "DONE", color: "#2f6f4f" }
    ];

    const state = {
      rootHandle: null,
      backlogHandle: null,
      planningHandle: null,
      backlogText: "",
      stories: [],
      dirty: false,
      selected: null
    };

    const PROJECT_HANDLE_STORE = {
      db: "archetipo-viewer",
      store: "handles",
      key: "project-root"
    };

    const el = {
      openProject: document.getElementById("openProject"),
      reload: document.getElementById("reload"),
      save: document.getElementById("save"),
      notice: document.getElementById("notice"),
      statusText: document.getElementById("statusText"),
      stats: document.getElementById("stats"),
      board: document.getElementById("board"),
      search: document.getElementById("search"),
      epicFilter: document.getElementById("epicFilter"),
      priorityFilter: document.getElementById("priorityFilter"),
      drawer: document.getElementById("drawer"),
      toast: document.getElementById("toast")
    };

    function setNotice(message) {
      el.notice.textContent = message || "";
      el.notice.classList.toggle("show", Boolean(message));
    }

    function getSuggestedProjectRootPath() {
      if (window.location.protocol !== "file:") return "";
      const rawPath = decodeURIComponent(window.location.pathname)
        .replace(/^\/([A-Za-z]:\/)/, "$1")
        .replace(/\//g, "\\");
      return rawPath.replace(/\\backlog-viewer\\index\.html$/i, "");
    }

    function toast(message) {
      el.toast.textContent = message;
      el.toast.classList.add("show");
      clearTimeout(toast.timer);
      toast.timer = setTimeout(() => el.toast.classList.remove("show"), 2200);
    }

    function setDirty(value) {
      state.dirty = value;
      el.save.disabled = !state.backlogHandle || !value;
      const suffix = value ? " Modifiche non salvate." : "";
      el.statusText.innerHTML = state.stories.length
        ? `<strong>${state.stories.length}</strong> storie caricate da docs/BACKLOG.md.${suffix}`
        : `Apri la root del progetto per iniziare.${suffix}`;
    }

    async function getChildHandle(parent, name, kind) {
      try {
        return kind === "directory"
          ? await parent.getDirectoryHandle(name)
          : await parent.getFileHandle(name);
      } catch {
        return null;
      }
    }

    async function chooseProject() {
      setNotice("");
      if (!("showDirectoryPicker" in window)) {
        const suggestedPath = getSuggestedProjectRootPath();
        setNotice(`Questo browser non espone la File System Access API. Apri questa pagina con Chrome o Edge${suggestedPath ? ` e seleziona ${suggestedPath}` : ", poi seleziona la cartella del progetto"}.`);
        return;
      }
      try {
        state.rootHandle = await window.showDirectoryPicker({
          id: "archetipo-project-root",
          mode: "readwrite"
        });
        await saveProjectRootHandle(state.rootHandle);
        await loadProject();
      } catch (error) {
        if (error.name !== "AbortError") setNotice(`Impossibile aprire la cartella: ${error.message}`);
      }
    }

    async function chooseDefaultProjectRoot() {
      if (!("showDirectoryPicker" in window)) {
        setDirty(false);
        return;
      }
      const storedHandle = await loadProjectRootHandle();
      if (storedHandle && await ensureReadWritePermission(storedHandle)) {
        state.rootHandle = storedHandle;
        await loadProject();
        return;
      }
      const suggestedPath = getSuggestedProjectRootPath();
      el.statusText.textContent = "Apri la root del progetto per iniziare.";
      setNotice(suggestedPath
        ? `Alla prima apertura il browser richiede conferma. Premi Apri progetto e seleziona questa cartella: ${suggestedPath}`
        : "Alla prima apertura il browser richiede conferma. Premi Apri progetto e seleziona la cartella root che contiene docs/BACKLOG.md.");
    }

    async function ensureReadWritePermission(handle) {
      const options = { mode: "readwrite" };
      try {
        if (await handle.queryPermission(options) === "granted") return true;
        return await handle.requestPermission(options) === "granted";
      } catch {
        return false;
      }
    }

    async function openHandleDb() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(PROJECT_HANDLE_STORE.db, 1);
        request.onupgradeneeded = () => request.result.createObjectStore(PROJECT_HANDLE_STORE.store);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function saveProjectRootHandle(handle) {
      try {
        const db = await openHandleDb();
        const tx = db.transaction(PROJECT_HANDLE_STORE.store, "readwrite");
        tx.objectStore(PROJECT_HANDLE_STORE.store).put(handle, PROJECT_HANDLE_STORE.key);
      } catch {
        // Persisted handles are an enhancement; manual selection still works without them.
      }
    }

    async function loadProjectRootHandle() {
      try {
        const db = await openHandleDb();
        return await new Promise((resolve, reject) => {
          const tx = db.transaction(PROJECT_HANDLE_STORE.store, "readonly");
          const request = tx.objectStore(PROJECT_HANDLE_STORE.store).get(PROJECT_HANDLE_STORE.key);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error);
        });
      } catch {
        return null;
      }
    }

    async function loadProject() {
      setNotice("");
      el.reload.disabled = true;
      const docs = await getChildHandle(state.rootHandle, "docs", "directory");
      if (!docs) {
        resetData("Non trovo la cartella docs nella root selezionata.");
        return;
      }

      state.backlogHandle = await getChildHandle(docs, "BACKLOG.md", "file");
      if (!state.backlogHandle) {
        resetData("Non trovo docs/BACKLOG.md nella cartella selezionata. La kanban resta vuota finche il backlog non esiste.");
        return;
      }

      state.planningHandle = await getChildHandle(docs, "planning", "directory");
      const file = await state.backlogHandle.getFile();
      state.backlogText = await file.text();
      state.stories = parseBacklog(state.backlogText);
      await attachPlanningTasks();
      populateFilters();
      render();
      el.reload.disabled = false;
      setDirty(false);
      if (!state.planningHandle) {
        setNotice("Backlog caricato. Non trovo docs/planning: le card sono visibili senza task di implementazione.");
      }
    }

    function resetData(message) {
      state.backlogHandle = null;
      state.planningHandle = null;
      state.backlogText = "";
      state.stories = [];
      render();
      setDirty(false);
      el.reload.disabled = true;
      setNotice(message);
    }

    function parseBacklog(markdown) {
      const storyHeading = /^####\s+(US-\d+):\s+(.+)$/gm;
      const matches = [...markdown.matchAll(storyHeading)];
      return matches.map((match, index) => {
        const start = match.index;
        const end = index + 1 < matches.length ? matches[index + 1].index : markdown.length;
        const block = markdown.slice(start, end);
        const meta = block.match(/\*\*Epic:\*\*\s*([^|]+)\|\s*\*\*Priority:\*\*\s*([^|]+)\|\s*\*\*Story Points:\*\*\s*([^\n]+)/);
        const status = block.match(/\*\*Status:\*\*\s*([A-Z_ -]+)/);
        const storyText = sectionText(block, "Story");
        const demonstrates = sectionText(block, "Demonstrates");
        const criteria = checkboxItems(block, "Acceptance Criteria");
        return {
          id: match[1],
          title: match[2].trim(),
          epic: meta ? meta[1].trim() : "Senza epic",
          priority: meta ? meta[2].trim().toUpperCase() : "MEDIUM",
          points: meta ? meta[3].trim() : "?",
          status: normalizeStatus(status ? status[1].trim() : "TODO"),
          story: storyText,
          demonstrates,
          criteria,
          blockStart: start,
          blockEnd: end,
          block,
          tasks: []
        };
      });
    }

    function sectionText(block, title) {
      const re = new RegExp("\\*\\*" + title + "\\*\\*\\n([\\s\\S]*?)(?=\\n\\*\\*|\\n---|$)", "i");
      const match = block.match(re);
      return match ? match[1].trim().replace(/\n+/g, " ") : "";
    }

    function checkboxItems(block, title) {
      const re = new RegExp("\\*\\*" + title + "\\*\\*\\n([\\s\\S]*?)(?=\\n\\*\\*|\\n---|$)", "i");
      const match = block.match(re);
      if (!match) return [];
      return match[1].split("\n")
        .map(line => line.match(/-\s+\[[ xX]\]\s+(.+)/))
        .filter(Boolean)
        .map(match => match[1].trim());
    }

    function normalizeStatus(value) {
      const normalized = String(value || "").trim().toUpperCase().replace(/[_-]+/g, " ").replace(/\s+/g, " ");
      return STATUSES.some(status => status.key === normalized) ? normalized : "TODO";
    }

    async function attachPlanningTasks() {
      if (!state.planningHandle) return;
      await Promise.all(state.stories.map(async story => {
        const handle = await getChildHandle(state.planningHandle, `${story.id}.md`, "file");
        if (!handle) return;
        const text = await (await handle.getFile()).text();
        story.tasks = parseTasks(text);
      }));
    }

    function parseTasks(markdown) {
      const lines = markdown.split(/\r?\n/);
      const tasks = [];
      for (const line of lines) {
        if (!line.trim().startsWith("|")) continue;
        if (line.includes("---") || line.includes("| Stato |")) continue;
        const cells = line.split("|").slice(1, -1).map(cell => cell.trim());
        if (cells.length < 6) continue;
        if (!/^TASK-\d+/i.test(cells[1])) continue;
        tasks.push({
          state: cells[0],
          id: cells[1],
          title: stripMd(cells[2]),
          description: stripMd(cells[3]),
          type: stripMd(cells[4]),
          dependencies: stripMd(cells[5])
        });
      }
      return tasks;
    }

    function stripMd(text) {
      return text.replace(/`/g, "").replace(/\*\*/g, "").trim();
    }

    function populateFilters() {
      fillSelect(el.epicFilter, "Tutti gli epic", [...new Set(state.stories.map(story => story.epic))].sort());
      fillSelect(el.priorityFilter, "Tutte le priorita", [...new Set(state.stories.map(story => story.priority))].sort());
    }

    function fillSelect(select, label, values) {
      const current = select.value;
      select.innerHTML = `<option value="">${label}</option>` + values.map(value => `<option value="${escapeHtml(value)}">${escapeHtml(value)}</option>`).join("");
      if (values.includes(current)) select.value = current;
    }

    function render() {
      renderStats();
      const filtered = filteredStories();
      el.board.innerHTML = STATUSES.map(status => columnTemplate(status, filtered)).join("");
      bindBoardEvents();
      if (!state.stories.length && !el.notice.classList.contains("show")) {
        el.board.innerHTML = `<div class="empty">Nessuna storia caricata.</div>`;
      }
    }

    function renderStats() {
      if (!state.stories.length) {
        el.stats.innerHTML = "";
        return;
      }
      const totalPoints = state.stories.reduce((sum, story) => sum + Number(story.points || 0), 0);
      const withTasks = state.stories.filter(story => story.tasks.length).length;
      el.stats.innerHTML = [
        `${state.stories.length} storie`,
        `${totalPoints} pt`,
        `${withTasks} con planning`,
        `${state.stories.filter(story => story.priority === "HIGH").length} HIGH`
      ].map(text => `<span class="pill">${escapeHtml(text)}</span>`).join("");
    }

    function filteredStories() {
      const query = el.search.value.trim().toLowerCase();
      return state.stories.filter(story => {
        const haystack = [story.id, story.title, story.epic, story.priority, story.story, ...story.tasks.map(task => `${task.id} ${task.title} ${task.description}`)].join(" ").toLowerCase();
        return (!query || haystack.includes(query))
          && (!el.epicFilter.value || story.epic === el.epicFilter.value)
          && (!el.priorityFilter.value || story.priority === el.priorityFilter.value);
      });
    }

    function columnTemplate(status, stories) {
      const columnStories = stories.filter(story => story.status === status.key);
      return `
        <section class="column" data-status="${status.key}">
          <header class="column-head">
            <div class="column-title">
              <span class="stripe" style="background:${status.color}"></span>
              <h2>${status.label}</h2>
            </div>
            <span class="column-count">${columnStories.length}</span>
          </header>
          <div class="cards">
            ${columnStories.length ? columnStories.map(cardTemplate).join("") : `<div class="empty">Nessuna card</div>`}
          </div>
        </section>
      `;
    }

    function cardTemplate(story) {
      const priorityClass = story.priority.toLowerCase();
      const tasks = story.tasks.slice(0, 5).map(task => `
        <div class="task"><span class="task-state">${escapeHtml(task.state)}</span><span>${escapeHtml(task.id)} · ${escapeHtml(task.title)}</span></div>
      `).join("");
      return `
        <article class="card" draggable="true" data-id="${story.id}">
          <div class="card-top">
            <span class="code">${story.id}</span>
            <span class="priority ${priorityClass}">${story.priority}</span>
          </div>
          <h3>${escapeHtml(story.title)}</h3>
          <div class="meta">
            <span>${escapeHtml(story.epic)}</span>
            <span>${escapeHtml(story.points)} pt</span>
          </div>
          <div class="tasks">
            <div class="task-summary"><span>Task planning</span><span>${story.tasks.length}</span></div>
            <div class="task-list">${tasks || `<span class="story">Nessun file docs/planning/${story.id}.md trovato.</span>`}</div>
          </div>
        </article>
      `;
    }

    function bindBoardEvents() {
      document.querySelectorAll(".card").forEach(card => {
        card.addEventListener("dragstart", event => {
          event.dataTransfer.setData("text/plain", card.dataset.id);
          event.dataTransfer.effectAllowed = "move";
        });
        card.addEventListener("click", event => {
          openDrawer(card.dataset.id);
        });
      });

      document.querySelectorAll(".column").forEach(column => {
        column.addEventListener("dragover", event => {
          event.preventDefault();
          column.classList.add("drag-over");
        });
        column.addEventListener("dragleave", () => column.classList.remove("drag-over"));
        column.addEventListener("drop", event => {
          event.preventDefault();
          column.classList.remove("drag-over");
          const id = event.dataTransfer.getData("text/plain");
          changeStatus(id, column.dataset.status);
        });
      });

    }

    function openDrawer(id) {
      const story = state.stories.find(item => item.id === id);
      if (!story) return;
      state.selected = id;
      el.drawer.innerHTML = `
        <div class="drawer-head">
          <div>
            <span class="code">${story.id}</span>
            <h2>${escapeHtml(story.title)}</h2>
          </div>
          <button class="icon-btn" type="button" id="closeDrawer" title="Chiudi">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <div class="meta">
          <span>${escapeHtml(story.epic)}</span>
          <span>${story.priority}</span>
          <span>${escapeHtml(story.points)} pt</span>
          <span>${story.status}</span>
        </div>
        <p class="story">${escapeHtml(story.story)}</p>
        ${detailList("Acceptance criteria", story.criteria)}
        ${detailTasks(story)}
      `;
      el.drawer.classList.add("open");
      document.getElementById("closeDrawer").addEventListener("click", () => el.drawer.classList.remove("open"));
    }

    function detailList(title, items) {
      if (!items.length) return "";
      return `<section class="detail-section"><h3>${title}</h3><ul>${items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul></section>`;
    }

    function detailTasks(story) {
      if (!story.tasks.length) return `<section class="detail-section"><h3>Task</h3><p class="story">Nessun planning trovato per ${story.id}.</p></section>`;
      return `<section class="detail-section"><h3>Task</h3><ul>${story.tasks.map(task => `<li><strong>${escapeHtml(task.id)}</strong> [${escapeHtml(task.state)}] ${escapeHtml(task.title)}<br>${escapeHtml(task.description)}</li>`).join("")}</ul></section>`;
    }

    async function changeStatus(id, status) {
      const story = state.stories.find(item => item.id === id);
      if (!story || story.status === status) return;
      const previousStatus = story.status;
      const previousBacklogText = state.backlogText;
      const previousDirty = state.dirty;
      story.status = status;
      state.backlogText = updateBacklogStatus(state.backlogText, id, status);
      setDirty(true);
      render();
      if (state.selected === id) openDrawer(id);
      try {
        await saveBacklog({ silent: true });
        toast(`${id} spostata in ${status} e salvata`);
      } catch {
        story.status = previousStatus;
        state.backlogText = previousBacklogText;
        render();
        if (state.selected === id) openDrawer(id);
        setDirty(previousDirty);
      }
    }

    function updateBacklogStatus(markdown, id, status) {
      const heading = new RegExp(`(^####\\s+${id}:.*$)`, "m");
      const headingMatch = markdown.match(heading);
      if (!headingMatch) return markdown;
      const start = headingMatch.index;
      const nextMatch = markdown.slice(start + headingMatch[0].length).match(/\n####\s+US-\d+:/);
      const end = nextMatch ? start + headingMatch[0].length + nextMatch.index : markdown.length;
      const block = markdown.slice(start, end);
      let nextBlock;
      if (/\*\*Status:\*\*\s*[A-Z_ -]+/.test(block)) {
        nextBlock = block.replace(/\*\*Status:\*\*\s*[A-Z_ -]+/, `**Status:** ${status}`);
      } else {
        nextBlock = block.replace(/(\*\*Epic:\*\*.*\n)/, `$1**Status:** ${status}\n`);
      }
      return markdown.slice(0, start) + nextBlock + markdown.slice(end);
    }

    async function saveBacklog(options = {}) {
      if (!state.backlogHandle || !state.dirty) return;
      try {
        const writable = await state.backlogHandle.createWritable();
        await writable.write(state.backlogText);
        await writable.close();
        setDirty(false);
        if (!options.silent) toast("BACKLOG.md salvato");
      } catch (error) {
        setNotice(`Salvataggio non riuscito: ${error.message}`);
        throw error;
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    el.openProject.addEventListener("click", chooseProject);
    el.reload.addEventListener("click", loadProject);
    el.save.addEventListener("click", saveBacklog);
    [el.search, el.epicFilter, el.priorityFilter].forEach(input => input.addEventListener("input", render));
    window.addEventListener("beforeunload", event => {
      if (!state.dirty) return;
      event.preventDefault();
      event.returnValue = "";
    });

    render();
    chooseDefaultProjectRoot();
  </script>
</body>
</html>
